      </span>

    </button>

  </div>

</div>

  `;
        }

        renderSidebar(dashboardData);

        function setDefaultActiveState() {
            const menuItems = document.querySelectorAll(".menu-item");

            menuItems.forEach((item, index) => {
                const text = item.querySelector(".menu-text");
                const svg = item.querySelector("svg path");
                const dot = item.querySelector(".menu-dot");

                if (index === 0) {
                    if (text) text.style.color = "#369FFF";
                    if (svg) svg.setAttribute("fill", "#369FFF");

                    if (dot) {
                        dot.style.background = "#369FFF";
                        dot.classList.remove("xl:hidden");
                    }
                } else {
                    if (text) text.style.color = "#BDBDBD";
                    if (svg) svg.setAttribute("fill", "#BDBDBD");

                    if (dot) dot.classList.add("xl:hidden");
                }
            });
        }
        setDefaultActiveState()
        const menuItems = document.querySelectorAll(".menu-item");

        function handleMenuClick() {
            const nav = document.querySelector("#sidebar nav");

            nav.addEventListener("click", (e) => {
                const item = e.target.closest(".menu-item");
                if (!item) return;

                const menuItems = nav.querySelectorAll(".menu-item");

                // Reset all
                menuItems.forEach(i => {
                    const text = i.querySelector(".menu-text");
                    const svg = i.querySelector("svg path");
                    const dot = i.querySelector(".menu-dot");

                    if (text) text.style.color = "#BDBDBD";
                    if (svg) svg.setAttribute("fill", "#BDBDBD");

                    if (dot) dot.classList.add("xl:hidden");
                });

                // Activate clicked
                const text = item.querySelector(".menu-text");
                const svg = item.querySelector("svg path");
                const dot = item.querySelector(".menu-dot");

                if (text) text.style.color = "#369FFF";
                if (svg) svg.setAttribute("fill", "#369FFF");

                if (dot) {
                    dot.style.background = "#369FFF";
                    dot.classList.remove("xl:hidden");
                }
            });
        }
        handleMenuClick()
        const mainContent = document.getElementById("mainContent");

        function renderMain(data) {
            mainContent.innerHTML = `
    
    <!-- Header -->
    <div class="xl:mb-6">
      <p class="xl:text-sm xl:text-gray-400">

        My Courses

    </div>

    <!-- Courses -->
    <div class="xl:grid xl:grid-cols-2 xl:gap-6 xl:mb-10">
      ${data.courses.map(course => `
        
        <div class="xl:relative xl:p-5 xl:rounded-2xl xl:text-white 
                    xl:bg-gradient-to-r ${course.color}">
          
          <h3 class="xl:text-lg xl:font-semibold">
            ${course.title}
          </h3>

          <p class="xl:text-sm xl:opacity-80">
            ${course.lessons} lessons
          </p>

          <!-- Progress -->
          <div class="xl:mt-4 xl:w-12 xl:h-12 xl:rounded-full 
                      xl:border-4 xl:border-white 
                      xl:flex xl:items-center xl:justify-center">
            ${course.progress}%
          </div>

          <!-- Icon -->
          <img src="${course.icon}" 
               class="xl:absolute xl:right-4 xl:bottom-3 xl:w-16">

        </div>

      `).join("")}

      <!-- Planning Header -->
      <div class="xl:flex xl:flex-col w-full col-span-2">
<div class="xl:flex xl:items-center xl:justify-between xl:mb-4 w-full">
  <h2 class="xl:text-xl xl:font-semibold">Planning</h2>
  <span class="xl:text-sm xl:text-blue-500">20 March 2020</span>
</div>

<!-- Planning Grid -->
<div id="planningContainer" 
     class="xl:grid xl:grid-cols-2 xl:gap-4 w-full">
</div>
</div>
    </div>

  `;
        }

        renderMain(dashboardData);

    </script>
