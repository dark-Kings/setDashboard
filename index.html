    const sidebar = document.getElementById("sidebar");
    const menuItems = document.querySelectorAll(".menu-item");
    const searchInput = document.getElementById("searchInput");
    const mainContent = document.getElementById("mainContent");
    const rightPanel = document.getElementById("rightPanel");

    // helper functions
    function setDefaultActiveState() {
      const menuItems = document.querySelectorAll(".menu-item");

      menuItems.forEach((item, index) => {
        const text = item.querySelector(".menu-text");
        const svg = item.querySelector("svg path");
        const dot = item.querySelector(".menu-dot");

        if (index === 0) {
          if (text) text.style.color = "#369FFF";
          if (svg) svg.setAttribute("fill", "#369FFF");

          if (dot) {
            dot.style.background = "#369FFF";
            dot.classList.remove("hidden");
          }
        } else {
          if (text) text.style.color = "#BDBDBD";
          if (svg) svg.setAttribute("fill", "#BDBDBD");

          if (dot) dot.classList.add("hidden");
        }
      });
    }

    function handleMenuClick() {
      const nav = document.querySelector("#sidebar nav");

      nav.addEventListener("click", (e) => {
        const item = e.target.closest(".menu-item");
        if (!item) return;

        const menuItems = nav.querySelectorAll(".menu-item");

        // Reset all
        menuItems.forEach(i => {
          const text = i.querySelector(".menu-text");
          const svg = i.querySelector("svg path");
          const dot = i.querySelector(".menu-dot");

          if (text) text.style.color = "#BDBDBD";
          if (svg) svg.setAttribute("fill", "#BDBDBD");

          if (dot) dot.classList.add("hidden");
        });

        // Activate clicked
        const text = item.querySelector(".menu-text");
        const svg = item.querySelector("svg path");
        const dot = item.querySelector(".menu-dot");

        if (text) text.style.color = "#369FFF";
        if (svg) svg.setAttribute("fill", "#369FFF");

        if (dot) {
          dot.style.background = "#369FFF";
          dot.classList.remove("hidden");
        }
      });
    }

    function handleSearch() {
      const searchInput = document.getElementById("searchInput");

      if (!searchInput) return;

      searchInput.onkeydown = function (e) {
        if (e.key === "Enter") {

        }
      };
    }

    function animateProgressRings() {
      const rings = document.querySelectorAll(".progress-ring");

      rings.forEach((ring, index) => {
        const progress = ring.getAttribute("data-progress");
        const circumference = 132;

        const offset = circumference - (progress / 100) * circumference;

        setTimeout(() => {
          ring.style.strokeDashoffset = -offset;
        }, index * 150);
      });
    }

    function handleCalendar() {
      const trigger = document.getElementById("calendarTrigger");
      const input = document.getElementById("datePicker");
      const display = document.getElementById("selectedDate");

      if (!trigger || !input || !display) return;

      // Open calendar
      trigger.onclick = () => {
        input.showPicker(); // 🔥 modern browsers
      };

      // Update UI on date select
      input.onchange = (e) => {
        const date = new Date(e.target.value);

        const formatted = date.toLocaleDateString("en-GB", {
          day: "numeric",
          month: "long",
          year: "numeric"
        });

        display.textContent = formatted;
      };
    }

    function handleSidebar() {

      const overlay = document.getElementById("sidebarOverlay");

      if (!sidebar || !toggle || !overlay) return;

      toggle.onclick = () => {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
      };

      overlay.onclick = () => {
        sidebar.classList.add("-translate-x-full");

    function handleTopBar(prefix = "desktop") {
      const notifTrigger = document.getElementById(`${prefix}-notificationTrigger`);
      const notifPanel = document.getElementById(`${prefix}-notificationPanel`);

      const profileTrigger = document.getElementById(`${prefix}-profileTrigger`);
      const profileDropdown = document.getElementById(`${prefix}-profileDropdown`);
      const profileArrow = document.getElementById(`${prefix}-profileArrow`);



      if (notifTrigger && notifPanel) {
        notifTrigger.onclick = (e) => {
          e.stopPropagation();
          notifPanel.classList.toggle("hidden");
          profileDropdown?.classList.add("hidden");
        };
      }

      if (profileTrigger && profileDropdown) {
        profileTrigger.onclick = (e) => {
          e.stopPropagation();
          profileDropdown.classList.toggle("hidden");
          profileArrow?.classList.toggle("rotate-180");
          notifPanel?.classList.add("hidden");
        };
      }

      document.addEventListener("click", () => {
        notifPanel?.classList.add("hidden");
        profileDropdown?.classList.add("hidden");
        profileArrow?.classList.remove("rotate-180");
      });
    }
